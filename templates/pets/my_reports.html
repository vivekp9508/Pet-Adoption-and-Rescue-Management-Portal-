{% extends 'base.html' %}
{% block title %}My Reports — Pet Rescue{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2 style="margin-bottom:0.2rem;">My Reports</h2>
        <p style="color:var(--warm-gray-2); font-size:0.88rem;">Track the status of your submitted reports</p>
    </div>
    <a href="/pets/report/" class="btn btn-primary">+ New Report</a>
</div>

<div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <select id="filter-status" onchange="loadMyReports()">
        <option value="">All Statuses</option>
        <option value="pending">Pending</option>
        <option value="accepted">Accepted</option>
        <option value="rejected">Rejected</option>
    </select>
    <select id="filter-type" onchange="loadMyReports()">
        <option value="">All Types</option>
        <option value="lost">Lost</option>
        <option value="found">Found</option>
    </select>
</div>

<div id="reports-container">
    <div class="card empty-state">
        <span class="empty-icon">🐾</span>
        <p>Loading your reports...</p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function loadMyReports() {
    let token = getToken();
    if (!token) { window.location.replace('/users/login/'); return; }

    let res = await fetch('/pets/api/reports/mine/', {
        headers: { 'Authorization': 'Bearer ' + token }
    });

    if (res.status === 401) {
        token = await refreshAccessToken();
        if (!token) { window.location.replace('/users/login/'); return; }
        res = await fetch('/pets/api/reports/mine/', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
    }

    const reports = await res.json();
    const container = document.getElementById('reports-container');

    const statusFilter = document.getElementById('filter-status').value;
    const typeFilter = document.getElementById('filter-type').value;

    let filtered = reports;
    if (statusFilter) filtered = filtered.filter(r => r.status === statusFilter);
    if (typeFilter) filtered = filtered.filter(r => r.report_type === typeFilter);

    if (!filtered.length) {
        container.innerHTML = `
            <div class="card empty-state">
                <span class="empty-icon">🐾</span>
                <p style="font-weight:500;">No reports found.</p>
                <p>You haven't submitted any reports yet, or none match your filter.</p>
                <a href="/pets/report/" class="btn btn-primary" style="margin-top:1rem;">Submit a Report</a>
            </div>`;
        return;
    }

    container.innerHTML = filtered.map(r => `
        <div class="card" style="padding:1.25rem;">
            <div style="display:flex; gap:1.25rem; align-items:flex-start;">
                <div style="flex-shrink:0;">
                    ${r.image_url
                        ? `<img src="${r.image_url}" style="width:100px; height:100px; object-fit:cover; border-radius:10px;" onerror="this.parentElement.innerHTML='<div style=width:100px;height:100px;background:var(--primary-xlight);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:2rem>🐾</div>'">`
                        : `<div style="width:100px; height:100px; background:var(--primary-xlight); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:2rem;">🐾</div>`
                    }
                </div>
                <div style="flex:1; min-width:0;">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; flex-wrap:wrap;">
                        <div style="display:flex; gap:0.4rem; flex-wrap:wrap;">
                            <span class="badge badge-${r.report_type}">${r.report_type.toUpperCase()}</span>
                            <span class="badge badge-${r.status}">${r.status.toUpperCase()}</span>
                        </div>
                        <span style="font-size:0.78rem; color:var(--warm-gray-3);">
                            ${new Date(r.created_at).toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'})}
                        </span>
                    </div>

                    <h3 style="margin:0.6rem 0 0.5rem; font-size:1rem;">
                        ${r.pet_type.charAt(0).toUpperCase() + r.pet_type.slice(1)}
                        ${r.breed ? `<span style="font-weight:400; color:var(--warm-gray-2);">· ${r.breed}</span>` : ''}
                    </h3>

                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.25rem 1rem; font-size:0.85rem; color:var(--warm-gray-2);">
                        <span>🎨 ${r.color}</span>
                        <span>📞 ${r.contact_info}</span>
                        <span>📍 ${r.location}</span>
                        ${r.description ? `<span>📝 ${r.description}</span>` : ''}
                    </div>

                    ${r.admin_note ? `
                        <div style="margin-top:0.85rem; padding:0.65rem 0.9rem; background:${r.status === 'rejected' ? 'var(--danger-light)' : 'var(--success-light)'}; border:1px solid ${r.status === 'rejected' ? 'var(--danger-border)' : 'var(--success-border)'}; border-radius:var(--radius); font-size:0.83rem; color:${r.status === 'rejected' ? 'var(--danger)' : 'var(--success)'};">
                            <strong>Admin note:</strong> ${r.admin_note}
                        </div>` : ''
                    }

                    ${r.status === 'pending' ? `
                        <div style="margin-top:0.85rem; padding:0.65rem 0.9rem; background:var(--warning-light); border:1px solid var(--warning-border); border-radius:var(--radius); font-size:0.83rem; color:var(--warning);">
                            ⏳ Your report is under review. You'll be notified once admin responds.
                        </div>` : ''
                    }
                </div>
            </div>
        </div>
    `).join('');
}

document.addEventListener('DOMContentLoaded', loadMyReports);
</script>
{% endblock %}
