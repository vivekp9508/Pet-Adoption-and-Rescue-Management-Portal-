{% extends 'base.html' %}
{% block title %}Admin Login — Pet Rescue{% endblock %}

{% block content %}
<div class="auth-wrapper">
<div class="auth-card">
    <span class="auth-icon">🔐</span>
    <h2>Admin access</h2>
    <p class="auth-sub">Restricted to authorised administrators only</p>

    <div class="alert alert-error" id="error-msg"></div>

    <div class="form-group">
        <label>Admin email</label>
        <input type="email" id="email" placeholder="admin@example.com" oninput="clearErr()">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password"
               oninput="clearErr()" onkeydown="if(event.key==='Enter') loginAdmin()">
    </div>

    <button class="btn btn-primary" onclick="loginAdmin()" style="width:100%; margin-top:0.5rem;">
        Login as Admin →
    </button>

    <div class="auth-divider"><a href="/users/login/" style="color:var(--warm-gray-2); font-size:0.85rem;">← Back to user login</a></div>
</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    const token = localStorage.getItem('access_token');
    if (token && (user.is_admin_user || user.is_staff)) {
        window.location.replace('/pets/admin-dashboard/');
    }
});

function clearErr() {
    document.getElementById('error-msg').style.display = 'none';
}

async function loginAdmin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('error-msg');

    if (!email || !password) {
        errorEl.textContent = 'Please enter both email and password.';
        errorEl.style.display = 'block';
        return;
    }

    const res = await fetch('/users/api/login/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });

    const result = await res.json();

    if (!res.ok) {
        errorEl.textContent = result.error || 'Invalid credentials.';
        errorEl.style.display = 'block';
        return;
    }

    if (!result.user.is_admin_user && !result.user.is_staff) {
        errorEl.textContent = 'Access denied. This page is for admins only.';
        errorEl.style.display = 'block';
        return;
    }

    const userData = { ...result.user, is_staff: true };
    localStorage.setItem('access_token', result.access);
    localStorage.setItem('refresh_token', result.refresh);
    localStorage.setItem('user', JSON.stringify(userData));
    window.location.replace('/pets/admin-dashboard/');
}
</script>
{% endblock %}
