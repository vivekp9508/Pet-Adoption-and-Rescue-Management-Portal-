{% extends 'base.html' %}
{% block title %}Report a Pet — Pet Rescue{% endblock %}

{% block content %}
<div style="max-width:600px; margin:0 auto;">
    <div style="margin-bottom:1.5rem;">
        <h2 style="margin-bottom:0.25rem;">Report a pet</h2>
        <p style="color:var(--warm-gray-2); font-size:0.9rem;">Fill in as many details as possible to help with matching.</p>
    </div>

    <div class="card">
        <div class="alert alert-error" id="error-msg"></div>
        <div class="alert alert-success" id="success-msg"></div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.9rem;">
            <div class="form-group" style="margin-bottom:0;">
                <label>Report Type</label>
                <select id="report_type">
                    <option value="lost"> Lost Pet</option>
                    <option value="found"> Found Pet</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label>Pet Type</label>
                <select id="pet_type" onchange="toggleOtherField()">
                    <option value="dog"> Dog</option>
                    <option value="cat"> Cat</option>
                    <option value="bird"> Bird</option>
                    <option value="other"> Other</option>
                </select>
            </div>
        </div>

        <div class="form-group" id="other-pet-group" style="display:none; margin-top:0.9rem;">
            <label>Please specify pet type</label>
            <input type="text" id="other_pet_type" placeholder="e.g. Rabbit, Turtle, Hamster" oninput="clearError('other-pet-error')">
            <small class="field-error" id="other-pet-error"></small>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.9rem; margin-top:0.9rem;">
            <div class="form-group" style="margin-bottom:0;">
                <label>Breed <span style="color:var(--warm-gray-3); font-weight:400;">(optional)</span></label>
                <input type="text" id="breed" placeholder="e.g. Labrador">
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label>Color</label>
                <input type="text" id="color" placeholder="e.g. Brown and white" oninput="clearError('color-error')">
                <small class="field-error" id="color-error"></small>
            </div>
        </div>

        <div class="form-group" style="margin-top:0.9rem;">
            <label>Location</label>
            <input type="text" id="location" placeholder="e.g. Near Central Park, Delhi" oninput="clearError('location-error')">
            <small class="field-error" id="location-error"></small>
        </div>

        <div class="form-group">
            <label>Description <span style="color:var(--warm-gray-3); font-weight:400;">(optional)</span></label>
            <textarea id="description" rows="3" placeholder="Any extra details that might help identify the pet..."></textarea>
        </div>

        <div class="form-group">
            <label>Contact Info</label>
            <div style="display:flex; gap:0.6rem;">
                <select id="contact_type" onchange="updateContactPlaceholder()" style="width:160px; flex-shrink:0;">
                    <option value="phone">📞 Phone</option>
                    <option value="email">✉️ Email</option>
                </select>
                <div style="flex:1;">
                    <input type="text" id="contact_info" placeholder="Enter 10-digit phone number" oninput="clearError('contact-error')">
                </div>
            </div>
            <small class="field-error" id="contact-error"></small>
        </div>

        <div class="form-group">
            <label>Photo <span style="color:var(--warm-gray-3); font-weight:400;">(optional)</span></label>
            <input type="file" id="image" accept="image/*" style="font-size:0.85rem;">
        </div>

        <button class="btn btn-primary" onclick="submitReport()" style="width:100%; padding:0.75rem; font-size:0.95rem;">
            Submit Report →
        </button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function toggleOtherField() {
    const petType = document.getElementById('pet_type').value;
    const otherGroup = document.getElementById('other-pet-group');
    otherGroup.style.display = petType === 'other' ? 'block' : 'none';
    if (petType !== 'other') {
        document.getElementById('other_pet_type').value = '';
        clearError('other-pet-error');
    }
}

function updateContactPlaceholder() {
    const type = document.getElementById('contact_type').value;
    const input = document.getElementById('contact_info');
    input.value = '';
    clearError('contact-error');
    input.placeholder = type === 'phone' ? 'Enter 10-digit phone number' : 'Enter email address';
}

function clearError(id) { document.getElementById(id).textContent = ''; }

function validateForm() {
    let valid = true;
    const petType = document.getElementById('pet_type').value;

    if (petType === 'other') {
        const otherVal = document.getElementById('other_pet_type').value.trim();
        if (!otherVal) { document.getElementById('other-pet-error').textContent = 'Please specify the pet type.'; valid = false; }
    }

    const color = document.getElementById('color').value.trim();
    if (!color) { document.getElementById('color-error').textContent = 'Color is required.'; valid = false; }

    const location = document.getElementById('location').value.trim();
    if (!location) { document.getElementById('location-error').textContent = 'Location is required.'; valid = false; }

    const contactType = document.getElementById('contact_type').value;
    const contactInfo = document.getElementById('contact_info').value.trim();

    if (!contactInfo) {
        document.getElementById('contact-error').textContent = 'Contact info is required.'; valid = false;
    } else if (contactType === 'phone' && !/^\d{10}$/.test(contactInfo)) {
        document.getElementById('contact-error').textContent = 'Phone must be exactly 10 digits.'; valid = false;
    } else if (contactType === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(contactInfo)) {
        document.getElementById('contact-error').textContent = 'Enter a valid email address.'; valid = false;
    }

    return valid;
}

async function submitReport() {
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('success-msg').style.display = 'none';
    if (!validateForm()) return;

    let token = getToken();
    if (!token) { window.location.replace('/users/login/'); return; }

    const petType = document.getElementById('pet_type').value;
    const formData = new FormData();
    formData.append('report_type', document.getElementById('report_type').value);
    formData.append('pet_type', petType);
    formData.append('breed', document.getElementById('breed').value.trim());
    formData.append('color', document.getElementById('color').value.trim());
    formData.append('location', document.getElementById('location').value.trim());
    formData.append('description', document.getElementById('description').value.trim());
    formData.append('contact_info', document.getElementById('contact_info').value.trim());
    const imageFile = document.getElementById('image').files[0];
    if (imageFile) formData.append('image', imageFile);

    let res = await fetch('/pets/api/reports/create/', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token },
        body: formData
    });

    if (res.status === 401) {
        token = await refreshAccessToken();
        if (!token) { window.location.replace('/users/login/'); return; }
        res = await fetch('/pets/api/reports/create/', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
            body: formData
        });
    }

    const result = await res.json();

    if (res.ok) {
        const el = document.getElementById('success-msg');
        el.style.display = 'block';
        let seconds = 6;
        el.textContent = `Report submitted! Waiting for admin approval. Redirecting in ${seconds}s...`;
        const countdown = setInterval(() => {
            seconds--;
            if (seconds <= 0) {
                clearInterval(countdown);
                window.location.replace('/pets/my-reports/');
            } else {
                el.textContent = `Report submitted! Waiting for admin approval. Redirecting in ${seconds}s...`;
            }
        }, 1000);
    } else {
        const el = document.getElementById('error-msg');
        el.textContent = typeof result === 'object'
            ? Object.values(result).flat().join(' ')
            : 'Something went wrong. Please try again.';
        el.style.display = 'block';
    }
}
</script>
{% endblock %}
