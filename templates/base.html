{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pet Rescue{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=5">
</head>
<body>
    <nav class="navbar">
        <a href="/pets/list/" class="nav-brand">🐾 Pet Rescue</a>
        <div class="nav-links">
            <a href="/pets/list/" class="nav-link">Browse</a>
            <a href="/pets/search/" class="nav-link" id="nav-search" style="display:none">Search</a>
            <a href="/pets/my-reports/" class="nav-link" id="nav-my-reports" style="display:none">My Reports</a>

            <!-- Notification Bell (users) -->
            <div class="notif-wrapper" id="nav-notif-wrapper" style="display:none">
                <button class="notif-bell-btn" onclick="toggleNotifDropdown()">
                    🔔
                    <span class="notif-count" id="notif-count"></span>
                </button>
                <div class="notif-dropdown" id="notif-dropdown">
                    <div class="notif-dropdown-header">Notifications</div>
                    <div id="notif-list"><div class="notif-item">Loading...</div></div>
                </div>
            </div>

            <span class="nav-user" id="nav-user" style="display:none"></span>
            <a href="/pets/report/" class="nav-cta-btn" id="nav-report" style="display:none">+ Report</a>
            <a href="javascript:void(0)" class="nav-link" id="nav-logout" style="display:none" onclick="logout()">Logout</a>
            <a href="/users/login/" class="nav-link" id="nav-login">Login</a>
            <a href="/users/register/" class="nav-cta-btn" id="nav-register">Register</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="{% static 'js/main.js' %}?v=5"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
