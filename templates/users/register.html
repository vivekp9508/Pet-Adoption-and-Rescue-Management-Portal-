{% extends 'base.html' %}
{% block title %}Register — Pet Rescue{% endblock %}

{% block content %}
<div class="auth-wrapper">
<div class="auth-card">
    <span class="auth-icon">🐾</span>
    <h2>Create account</h2>
    <p class="auth-sub">Join Pet Rescue and help reunite lost pets</p>

    <div class="alert alert-error" id="error-msg"></div>
    <div class="alert alert-success" id="success-msg"></div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
        <div class="form-group" style="margin-bottom:0;">
            <label>Username</label>
            <input type="text" id="username" placeholder="username" oninput="clearError('username-error')">
            <small class="field-error" id="username-error"></small>
        </div>
        <div class="form-group" style="margin-bottom:0;">
            <label>Phone <span style="color:var(--warm-gray-3); font-weight:400;">(optional)</span></label>
            <input type="text" id="phone" placeholder="10-digit number" maxlength="10" oninput="clearError('phone-error')">
            <small class="field-error" id="phone-error"></small>
        </div>
    </div>

    <div class="form-group" style="margin-top:0.75rem;">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@example.com" oninput="clearError('email-error')">
        <small class="field-error" id="email-error"></small>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
        <div class="form-group" style="margin-bottom:0;">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min 8 characters" oninput="clearError('password-error')">
            <small class="field-error" id="password-error"></small>
        </div>
        <div class="form-group" style="margin-bottom:0;">
            <label>Confirm password</label>
            <input type="password" id="confirm-password" placeholder="Repeat password" oninput="clearError('confirm-error')">
            <small class="field-error" id="confirm-error"></small>
        </div>
    </div>

    <button class="btn btn-primary" onclick="registerUser()" style="width:100%; margin-top:1.25rem;">
        Create Account →
    </button>

    <div class="auth-divider">Already have an account? <a href="/users/login/" style="color:var(--primary); font-weight:500;">Login</a></div>
</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function clearError(id) { document.getElementById(id).textContent = ''; }

function validateForm() {
    let valid = true;
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;

    if (!username) { document.getElementById('username-error').textContent = 'Username is required.'; valid = false; }
    else if (username.length < 3) { document.getElementById('username-error').textContent = 'At least 3 characters.'; valid = false; }
    else if (!/^[a-zA-Z0-9_]+$/.test(username)) { document.getElementById('username-error').textContent = 'Letters, numbers, underscores only.'; valid = false; }

    if (!email) { document.getElementById('email-error').textContent = 'Email is required.'; valid = false; }
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('email-error').textContent = 'Enter a valid email address.'; valid = false; }

    if (phone && !/^\d{10}$/.test(phone)) { document.getElementById('phone-error').textContent = 'Must be exactly 10 digits.'; valid = false; }

    if (!password) { document.getElementById('password-error').textContent = 'Password is required.'; valid = false; }
    else if (password.length < 8) { document.getElementById('password-error').textContent = 'At least 8 characters.'; valid = false; }
    else if (!/[a-zA-Z]/.test(password)) { document.getElementById('password-error').textContent = 'Must contain a letter.'; valid = false; }
    else if (!/[0-9]/.test(password)) { document.getElementById('password-error').textContent = 'Must contain a number.'; valid = false; }

    if (!confirm) { document.getElementById('confirm-error').textContent = 'Please confirm your password.'; valid = false; }
    else if (password !== confirm) { document.getElementById('confirm-error').textContent = 'Passwords do not match.'; valid = false; }

    return valid;
}

async function registerUser() {
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('success-msg').style.display = 'none';
    if (!validateForm()) return;

    const data = {
        username: document.getElementById('username').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        password: document.getElementById('password').value,
    };

    try {
        const res = await fetch('/users/api/register/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await res.json();

        if (res.ok) {
            localStorage.setItem('access_token', result.access);
            localStorage.setItem('refresh_token', result.refresh);
            localStorage.setItem('user', JSON.stringify(result.user));
            const el = document.getElementById('success-msg');
            el.textContent = 'Account created! Redirecting...';
            el.style.display = 'block';
            setTimeout(() => window.location.replace('/pets/list/'), 1200);
        } else {
            if (result.email) document.getElementById('email-error').textContent = result.email[0];
            if (result.username) document.getElementById('username-error').textContent = result.username[0];
            const el = document.getElementById('error-msg');
            el.textContent = 'Please fix the errors above.';
            el.style.display = 'block';
        }
    } catch {
        const el = document.getElementById('error-msg');
        el.textContent = 'Network error. Please try again.';
        el.style.display = 'block';
    }
}
</script>
{% endblock %}
